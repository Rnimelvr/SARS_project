openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: SARS - Smart Animal Repellent System API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: dashboard
    description: Dashboard operations
  - name: detections
    description: Detection records
  - name: statistics
    description: Statistics and analytics
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /dashboard/status:
    get:
      operationId: getDashboardStatus
      tags: [dashboard]
      summary: Get dashboard system status and recent detections
      responses:
        "200":
          description: Dashboard status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStatus"

  /detections:
    get:
      operationId: getDetections
      tags: [detections]
      summary: Get all detection records with optional filters
      parameters:
        - in: query
          name: animal_type
          schema:
            type: string
          description: Filter by animal type (Lebah, Anjing, Monyet)
        - in: query
          name: date
          schema:
            type: string
          description: Filter by date (YYYY-MM-DD)
        - in: query
          name: status
          schema:
            type: string
          description: Filter by status (detected, repelled)
      responses:
        "200":
          description: List of detections
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Detection"

    post:
      operationId: createDetection
      tags: [detections]
      summary: Create a new detection record (for IoT device input)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DetectionInput"
      responses:
        "201":
          description: Detection created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Detection"

  /statistics:
    get:
      operationId: getStatistics
      tags: [statistics]
      summary: Get statistics and analytics
      responses:
        "200":
          description: Statistics data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Statistics"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    LoginInput:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
      required:
        - username
        - password

    AuthResponse:
      type: object
      properties:
        success:
          type: boolean
        username:
          type: string
        full_name:
          type: string
      required:
        - success
        - username
        - full_name

    User:
      type: object
      properties:
        username:
          type: string
        full_name:
          type: string
        role:
          type: string
      required:
        - username
        - full_name
        - role

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required:
        - success
        - message

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    Detection:
      type: object
      properties:
        id:
          type: integer
        animal_type:
          type: string
        location:
          type: string
        status:
          type: string
        detected_at:
          type: string
      required:
        - id
        - animal_type
        - location
        - status
        - detected_at

    DetectionInput:
      type: object
      properties:
        animal_type:
          type: string
        location:
          type: string
        status:
          type: string
        detected_at:
          type: ["string", "null"]
      required:
        - animal_type
        - location

    AnimalBreakdown:
      type: object
      properties:
        animal_type:
          type: string
        total:
          type: integer
      required:
        - animal_type
        - total

    WeeklyTrend:
      type: object
      properties:
        date:
          type: string
        total:
          type: integer
      required:
        - date
        - total

    Statistics:
      type: object
      properties:
        total_cases:
          type: integer
        cases_today:
          type: integer
        alert_level:
          type: string
        breakdown:
          type: array
          items:
            $ref: "#/components/schemas/AnimalBreakdown"
        weekly_trend:
          type: array
          items:
            $ref: "#/components/schemas/WeeklyTrend"
      required:
        - total_cases
        - cases_today
        - alert_level
        - breakdown
        - weekly_trend

    DashboardStatus:
      type: object
      properties:
        system_status:
          type: string
        cases_today:
          type: integer
        recent_detections:
          type: array
          items:
            $ref: "#/components/schemas/Detection"
      required:
        - system_status
        - cases_today
        - recent_detections
